project_id: crewbee-project-context
cycles:
  - id: C1
    title: Repository initialization and context-layer MVP
    status: active
    steps:
      - id: S1
        title: Initialize repository, docs, .crewbee/.prjctxt workspace, and minimal CLI/API skeleton
        status: completed
        acceptance:
          - package metadata exists for crewbee-project-context
          - .crewbee/.prjctxt workspace exists and documents current project context
          - human docs describe positioning, architecture, and CrewBee integration
          - diagnostics, tests, and build/typecheck commands are available
      - id: S2
        title: Implement scaffold init and doctor MVP
        status: completed
        acceptance:
          - init can create .crewbee/.prjctxt in a target project
          - .crewbee/.prjctxt is the only production context directory name
          - doctor catches missing files and state/plan inconsistencies
      - id: S3
        title: Implement primer MVP
        status: completed
        acceptance:
          - primer summarizes active step, blockers, next actions, and high-signal memory
          - primer respects a configurable token budget
      - id: S4
        title: Implement read/search MVP
        status: completed
        acceptance:
          - read only accesses project context files
          - search returns source, excerpt, and score
      - id: S5
        title: Implement update/finalize MVP
        status: completed
        acceptance:
          - state and handoff updates are safe
          - observations can be written per checkpoint
          - memory and decisions are appended only for durable information
      - id: S6
        title: Implement minimal optional CrewBee integration bridge
        status: completed
        acceptance:
          - CrewBee can use context tools when .crewbee/.prjctxt exists
          - CrewBee behavior is unchanged when .crewbee/.prjctxt is absent or disabled
          - integration remains adapter/plugin level with no CrewBee Core coupling
          - tool surface is limited to prepare/search/finalize and does not expose project_context_read
      - id: S7
        title: Hold minimal baseline and only add release hardening when requested
        status: active
        acceptance:
          - no new abstraction is added without a real caller
          - no new dependency is added without removing more complexity than it adds
          - next implementation step has explicit user or release acceptance criteria
  - id: C2
    title: Real CrewBee/OpenCode runtime integration
    status: active
    steps:
      - id: S8
        title: Add real OpenCode plugin adapter for project-context
        status: completed
        acceptance:
          - package exposes a server plugin entrypoint compatible with OpenCode package plugin loading
          - plugin default export has an object with server() per OpenCode v1 plugin shape
          - system prompt transform injects only Runtime Rule plus compact Context Capsule
          - OpenCode tool map exposes only project_context_prepare, project_context_search, and project_context_finalize
          - absent .crewbee/.prjctxt workspaces stay ephemeral until finalize includes material project progress
          - no project_context_read or scaffold path menu is exposed to the main agent
      - id: S9
        title: Match CrewBee user-level plugin publish and install model
        status: completed
        acceptance:
          - build creates dist/opencode-plugin.mjs from the OpenCode adapter entrypoint
          - package main and exports include the OpenCode server entrypoint in the same style as CrewBee
          - npm files include the bundled plugin artifact and runtime dist files
          - install flow targets the OpenCode user-level workspace rather than business-project node_modules
          - OpenCode config can load the package by canonical package-name plugin entry
          - any CLI added for install or doctor does not expose scaffold init/read/update as a user workflow
      - id: S10
        title: Integrate with CrewBee Agent Team runtime without core coupling
        status: planned
        acceptance:
          - CrewBee can either load project-context as a sibling OpenCode plugin or explicitly import it as an optional extension
          - CrewBee Leader prompt receives project context rules without duplicating scaffold documents
          - project-context tools are available to CrewBee projected agents in normal OpenCode sessions
          - internal project-context-maintainer is mapped to a delegated sub session or equivalent internal agent execution path
          - integration does not change CrewBee Team definitions or force CrewBee Core dependency on scaffold internals
      - id: S11
        title: End-to-end OpenCode startup smoke verification
        status: active
        acceptance:
          - install project-context into OpenCode user-level workspace with the same operational shape as CrewBee
          - OpenCode startup loads both crewbee and project-context plugins without plugin entrypoint errors
          - a CrewBee coding leader session sees only compact project context prompt material
          - prepare/search/finalize tools execute successfully from an OpenCode session
          - empty finalize does not create .crewbee/.prjctxt while material finalize does
